apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-policies
  namespace: argocd
spec:
  project: infra
  source:
    repoURL: https://github.com/<your-user-or-org>/platform-gitops.git
    targetRevision: main
    path: clusters/prod/policies
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true